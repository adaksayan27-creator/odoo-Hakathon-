<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Odoo HRMS - Profile Settings</title>
    <!-- Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Styles -->
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/profile.css">
</head>
<body>

    <div class="app-layout">
        <!-- Sidebar injected via js/api.js -->
        <aside id="app-sidebar"></aside>

        <div class="app-content">
            <!-- Header injected via js/api.js -->
            <header id="app-navbar"></header>

            <main class="view-container">
                <div class="dashboard-card" style="padding: 0; overflow: hidden; margin-bottom: 24px;">
                    <div class="profile-cover"></div>
                    <div class="profile-avatar-wrap">
                        <img id="profile-avatar" class="profile-avatar-img" src="https://images.unsplash.com/photo-1534528741775-53994a69daeb?auto=format&fit=crop&w=200&q=80" alt="Avatar">
                        <label for="profile-avatar-input" class="avatar-upload-overlay" id="profile-avatar-label">
                            <i class="fa-solid fa-camera"></i>
                            <input type="file" id="profile-avatar-input" accept="image/*" style="display:none;">
                        </label>
                    </div>
                    <div class="profile-main-info">
                        <h2 id="profile-full-name">--</h2>
                        <p id="profile-designation" class="auth-subtitle" style="margin-top: 2px;">--</p>
                    </div>

                    <!-- Profile Tabs -->
                    <div class="profile-tabs">
                        <button id="btn-profile-tab-personal" class="profile-tab-btn active">Personal Info</button>
                        <button id="btn-profile-tab-job" class="profile-tab-btn">Job Details</button>
                        <button id="btn-profile-tab-salary" class="profile-tab-btn">Salary Structure</button>
                        <button id="btn-profile-tab-docs" class="profile-tab-btn">Documents</button>
                    </div>

                    <!-- Personal Info Form -->
                    <div id="profile-tab-personal-content" class="profile-tab-body-pane" style="padding: 30px;">
                        <form id="profile-personal-form">
                            <div class="form-grid">
                                <div class="form-group">
                                    <label class="form-label" for="profile-address">Address</label>
                                    <input type="text" id="profile-address" class="form-input" placeholder="Address line" required>
                                </div>
                                <div class="form-group">
                                    <label class="form-label" for="profile-phone">Phone Number</label>
                                    <input type="text" id="profile-phone" class="form-input" placeholder="+1 (555) 123-4567" required>
                                </div>
                                <div class="form-group">
                                    <label class="form-label" for="profile-email">Email (Read Only)</label>
                                    <input type="email" id="profile-email" class="form-input" readonly disabled style="background: var(--bg-app); cursor: not-allowed;">
                                </div>
                                <div class="form-group">
                                    <label class="form-label" for="profile-empid">Employee ID (Read Only)</label>
                                    <input type="text" id="profile-empid" class="form-input" readonly disabled style="background: var(--bg-app); cursor: not-allowed;">
                                </div>
                            </div>
                            <div class="form-actions">
                                <button type="submit" id="btn-save-personal-profile" class="btn btn-accent" style="width: auto; padding: 12px 24px;">Save Changes</button>
                            </div>
                        </form>
                    </div>

                    <!-- Job Details Tab -->
                    <div id="profile-tab-job-content" class="profile-tab-body-pane d-none" style="padding: 30px;">
                        <form id="profile-job-form">
                            <div class="form-grid">
                                <div class="form-group">
                                    <label class="form-label" for="profile-job-title">Job Title</label>
                                    <input type="text" id="profile-job-title" class="form-input" placeholder="e.g. Developer Specialist" required>
                                </div>
                                <div class="form-group">
                                    <label class="form-label" for="profile-department">Department</label>
                                    <input type="text" id="profile-department" class="form-input" placeholder="e.g. Operations" required>
                                </div>
                                <div class="form-group">
                                    <label class="form-label" for="profile-join-date">Date of Joining</label>
                                    <input type="date" id="profile-join-date" class="form-input" required>
                                </div>
                                <div class="form-group">
                                    <label class="form-label" for="profile-status">Employment Status</label>
                                    <select id="profile-status" class="form-input">
                                        <option value="Active">Active</option>
                                        <option value="On Leave">On Leave</option>
                                        <option value="Terminated">Terminated</option>
                                    </select>
                                </div>
                            </div>
                            <div id="admin-job-actions" class="form-actions d-none">
                                <button type="submit" id="btn-save-job-profile" class="btn" style="width: auto; padding: 12px 24px;">Save Job Details (Admin Only)</button>
                            </div>
                            <div id="emp-job-msg" class="auth-subtitle" style="margin-top: 10px; color: var(--color-danger);">
                                <i class="fa-solid fa-lock"></i> Only Admin/HR Officers can modify job details.
                            </div>
                        </form>
                    </div>

                    <!-- Salary Structure Tab -->
                    <div id="profile-tab-salary-content" class="profile-tab-body-pane d-none" style="padding: 30px;">
                        <h3>Salary Structure Breakdown</h3>
                        <p class="auth-subtitle" style="margin-bottom: 20px;">Official basic components of your monthly salary compensation.</p>
                        <div class="form-grid">
                            <div class="form-group">
                                <label class="form-label">Basic Salary ($)</label>
                                <input type="text" id="profile-salary-basic" class="form-input" readonly disabled style="background: var(--bg-app); cursor: not-allowed;">
                            </div>
                            <div class="form-group">
                                <label class="form-label">House Rent Allowance (HRA) ($)</label>
                                <input type="text" id="profile-salary-hra" class="form-input" readonly disabled style="background: var(--bg-app); cursor: not-allowed;">
                            </div>
                            <div class="form-group">
                                <label class="form-label">Allowances & Bonuses ($)</label>
                                <input type="text" id="profile-salary-bonus" class="form-input" readonly disabled style="background: var(--bg-app); cursor: not-allowed;">
                            </div>
                            <div class="form-group">
                                <label class="form-label">Deductions (Taxes) ($)</label>
                                <input type="text" id="profile-salary-deductions" class="form-input" readonly disabled style="background: var(--bg-app); cursor: not-allowed; color: var(--color-danger);">
                            </div>
                        </div>
                        <div style="margin-top: 25px; padding-top: 20px; border-top: 1px solid var(--border-color); display: flex; justify-content: space-between; align-items: center;">
                            <span style="font-weight: 700; font-size: 1.1rem; color: var(--text-color);">Net Salary:</span>
                            <span id="profile-salary-net" style="font-weight: 800; font-size: 1.3rem; color: var(--color-success);">$0.00</span>
                        </div>
                    </div>

                    <!-- Documents Tab -->
                    <div id="profile-tab-docs-content" class="profile-tab-body-pane d-none" style="padding: 30px;">
                        <h3>Uploaded Documents</h3>
                        <div class="table-container">
                            <table class="custom-table">
                                <thead>
                                    <tr>
                                        <th>Document Name</th>
                                        <th>Type</th>
                                        <th>Size</th>
                                        <th>Actions</th>
                                    </tr>
                                </thead>
                                <tbody>
                                    <tr>
                                        <td>Employment_Agreement.pdf</td>
                                        <td>PDF Document</td>
                                        <td>1.2 MB</td>
                                        <td>
                                            <button class="action-icon-btn" title="Download"><i class="fa-solid fa-download"></i></button>
                                        </td>
                                    </tr>
                                    <tr>
                                        <td>ID_Card_Copy.png</td>
                                        <td>Image</td>
                                        <td>450 KB</td>
                                        <td>
                                            <button class="action-icon-btn" title="Download"><i class="fa-solid fa-download"></i></button>
                                        </td>
                                    </tr>
                                </tbody>
                            </table>
                        </div>
                    </div>
                </div>
            </main>
        </div>
    </div>

    <!-- Scripts -->
    <script src="js/api.js"></script>
    <script src="js/profile.js"></script>
</body>
</html>
