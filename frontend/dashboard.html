<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Odoo HRMS - Employee Dashboard</title>
    <!-- Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Styles -->
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/dashboard.css">
</head>
<body>

    <div class="app-layout">
        <!-- Sidebar placeholder injected via js/api.js -->
        <aside id="app-sidebar"></aside>

        <div class="app-content">
            <!-- Navbar placeholder injected via js/api.js -->
            <header id="app-navbar"></header>

            <main class="view-container">
                <!-- Summary Stats -->
                <div class="grid-cols-4">
                    <div class="dashboard-card">
                        <div class="stat-icon primary"><i class="fa-solid fa-business-time"></i></div>
                        <div class="stat-title">Remaining Leaves</div>
                        <div id="emp-dash-leaves-val" class="stat-value">-- Days</div>
                        <div class="stat-trend trend-up"><i class="fa-solid fa-circle-info"></i> Paid & Sick leaves</div>
                    </div>
                    <div class="dashboard-card">
                        <div class="stat-icon success"><i class="fa-solid fa-clock"></i></div>
                        <div class="stat-title">Hours logged (Month)</div>
                        <div id="emp-dash-hours-val" class="stat-value">-- hrs</div>
                        <div class="stat-trend trend-up"><i class="fa-solid fa-circle-check"></i> Target 160 hrs</div>
                    </div>
                    <div class="dashboard-card">
                        <div class="stat-icon accent"><i class="fa-solid fa-money-bill-wave"></i></div>
                        <div class="stat-title">Last Net Pay</div>
                        <div id="emp-dash-salary-val" class="stat-value">$0</div>
                        <div class="stat-trend"><i class="fa-solid fa-calendar"></i> Disbursed Jun 30</div>
                    </div>
                    <div class="dashboard-card">
                        <div class="stat-icon warning"><i class="fa-solid fa-bell"></i></div>
                        <div class="stat-title">Pending Approvals</div>
                        <div id="emp-dash-approvals-val" class="stat-value">-- Requests</div>
                        <div class="stat-trend"><i class="fa-solid fa-business-time"></i> Time-Off reviews</div>
                    </div>
                </div>

                <!-- Widgets Row -->
                <div class="grid-cols-3">
                    <!-- Attendance Punch Widget -->
                    <div class="dashboard-card attendance-widget">
                        <h3>Attendance Clock</h3>
                        <div id="active-timer-display" class="timer-display">00:00:00</div>
                        <span id="active-status-badge" class="attendance-status-badge status-badge-absent">Not Checked In</span>
                        <button id="btn-clock-toggle" class="btn btn-accent"><i class="fa-solid fa-right-to-bracket"></i> Check In</button>
                    </div>

                    <!-- Quick Navigation -->
                    <div class="dashboard-card">
                        <h3>Quick Access</h3>
                        <div class="quick-actions-panel" style="margin-top: 15px;">
                            <a href="profile.html" class="action-btn-widget">
                                <i class="fa-solid fa-id-card"></i>
                                <span>My Profile</span>
                            </a>
                            <a href="leave.html" class="action-btn-widget">
                                <i class="fa-solid fa-plane-departure"></i>
                                <span>Time-Off</span>
                            </a>
                            <a href="attendance.html" class="action-btn-widget">
                                <i class="fa-solid fa-calendar-days"></i>
                                <span>Log History</span>
                            </a>
                            <a href="payroll.html" class="action-btn-widget">
                                <i class="fa-solid fa-wallet"></i>
                                <span>Salary Slip</span>
                            </a>
                        </div>
                    </div>

                    <!-- Activities Stream -->
                    <div class="dashboard-card">
                        <h3>Recent Activity</h3>
                        <div style="margin-top: 15px; max-height: 250px; overflow-y: auto;">
                            <ul id="employee-activity-feed" class="activity-feed">
                                <!-- Loaded dynamically -->
                            </ul>
                        </div>
                    </div>
                </div>
            </main>
        </div>
    </div>

    <!-- Scripts -->
    <script src="js/api.js"></script>
    <script src="js/dashboard.js"></script>
</body>
</html>
